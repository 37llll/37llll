name: Generate Snake Animation

on:
  schedule:
    # 每天 UTC 0:00 更新一次
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: 37llll
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg
          
      - name: Copy files to root
        run: |
          cp dist/github-contribution-grid-snake.svg .
          cp dist/github-contribution-grid-snake.gif .
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake.gif
          git commit -m "Update snake animation" || exit 0
          git push
